<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Helix — Offline</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            -webkit-app-region: drag;
        }
        .container {
            max-width: 400px;
            padding: 40px;
            -webkit-app-region: no-drag;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.8;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 16px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        .logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>No Internet Connection</h1>
        <p>Helix requires an active connection to access the hacking engine and agent mode. Please check your network and try again.</p>
        <button onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
